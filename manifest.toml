packaging_format = 2

id = "wg-man"
name = "WG Manager"
description.en = "WireGuard VPN configuration manager with YunoHost SSO authentication"
version = "0.1.0~ynh1"

maintainers = []

[upstream]
license = "MIT"

[integration]
yunohost = ">= 11.2"
architectures = ["amd64", "arm64"]
multi_instance = false
ldap = false
sso = true
disk = "300M"
ram.build = "256M"
ram.runtime = "64M"

[install]

  [install.domain]
  type = "domain"

  [install.path]
  type = "path"
  default = "/wg-man"

  [install.init_main_permission]
  type = "group"
  default = "admins"

  [install.wg_config_dir]
  ask.en = "Directory containing WireGuard .conf files"
  type = "string"
  default = "/etc/wireguard"
  pattern.regexp = "^/[a-zA-Z0-9/_.-]+$"
  pattern.error = "Must be an absolute path with safe characters only"

  [install.wg_config_pattern]
  ask.en = "Glob pattern for tunnel config files (e.g. wg-*.conf or vpn-*.conf) — must start with at least one letter/digit before the wildcard"
  type = "string"
  default = "wg-*.conf"
  pattern.regexp = "^[a-zA-Z0-9][a-zA-Z0-9*_.-]*$"
  pattern.error = "Must start with an alphanumeric character (e.g. wg-*.conf). A bare *.conf is not allowed as it would expose all config files."

  [install.wg_static_interface]
  ask.en = "Name of the always-on WireGuard interface"
  type = "string"
  default = "wg0"
  pattern.regexp = "^[a-zA-Z0-9_-]+$"
  pattern.error = "Only alphanumeric characters, underscores, and hyphens"

  [install.monitor_script]
  ask.en = "Full path to the VPN monitor script (a default stub is installed if the file does not exist)"
  type = "string"
  default = "/usr/local/bin/vpn-monitor.sh"
  pattern.regexp = "^/[a-zA-Z0-9/_.-]+$"
  pattern.error = "Must be an absolute path with safe characters only"

  [install.log_file]
  ask.en = "Path to the VPN monitor log file"
  type = "string"
  default = "/var/log/vpn-monitor.log"
  pattern.regexp = "^/[a-zA-Z0-9/_.-]+$"
  pattern.error = "Must be an absolute path with safe characters only"

  [install.check_ip]
  ask.en = "IP address used for ping-based connectivity checks"
  type = "string"
  default = "1.1.1.1"
  pattern.regexp = "^[0-9.:a-fA-F]+$"
  pattern.error = "Must be a valid IPv4 or IPv6 address"

  [install.dex_domain]
  ask.en = "Dex OIDC domain for LDAP login (e.g. dex.yourdomain.com) — leave empty to use SSOwat authentication only"
  type = "string"
  default = ""
  optional = true
  pattern.regexp = "^$|^[a-zA-Z0-9._-]+$"
  pattern.error = "Must be a valid domain name or empty"

[resources]

  # Provisions the wg-man system user/group required by install_dir
  # The service itself still runs as root (wg-quick needs CAP_NET_ADMIN)
  [resources.system_user]

  [resources.install_dir]
  dir = "/opt/__APP__"

  [resources.data_dir]
  dir = "/var/lib/__APP__"

  [resources.ports]
  main.default = 3001

  [resources.apt]
  packages = ["wireguard-tools"]

  [resources.permissions]
  main.url = "/"
