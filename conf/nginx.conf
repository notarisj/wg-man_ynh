#sub_path_only rewrite ^__PATH__$ __PATH__/ permanent;
location __PATH__/ {
    # Declare SSOwat Lua variables so nginx doesn't reject the config.
    # SSOwat overwrites these at request time after portal authentication.
    set $ynh_user     "";
    set $ynh_email    "";
    set $ynh_fullname "";

    proxy_pass http://127.0.0.1:__PORT__/;
    proxy_http_version 1.1;

    # WebSocket upgrade support
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # SSOwat injects these after portal authentication
    proxy_set_header YNH_USER      $ynh_user;
    proxy_set_header YNH_EMAIL     $ynh_email;
    proxy_set_header YNH_FULLNAME  $ynh_fullname;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Generous timeouts for long-lived WebSocket connections
    proxy_read_timeout    86400;
    proxy_send_timeout    86400;
    proxy_connect_timeout 10;

    more_set_headers "Strict-Transport-Security: max-age=15768000";
}
