#sub_path_only rewrite ^__PATH__$ __PATH__/ permanent;

# OIDC auth routes bypass SSOwat so the login/callback endpoints are reachable
# before the user has a YunoHost session (e.g. Dex redirect callbacks).
location __PATH__/api/auth/ {
    proxy_pass http://127.0.0.1:__PORT__/api/auth/;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Still forward the proxy secret so the backend can reject direct-to-port abuse
    proxy_set_header X-WG-Secret       __PROXY_SECRET__;

    more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains";
}

location __PATH__/ {
    # Declare nginx variables for SSOwat Lua integration.
    # SSOwat may set them via ngx.var (ngx.var.ynh_user = user)
    # OR via ngx.req.set_header('YNH_USER', user).
    # Initialise to empty so nginx doesn't error on undefined variable;
    # do NOT pre-populate from $http_ynh_user here — that would capture the
    # empty value BEFORE SSOwat's access_by_lua overwrites it via ngx.req.set_header.
    set $ynh_user     "";
    set $ynh_email    "";
    set $ynh_fullname "";

    proxy_pass http://127.0.0.1:__PORT__/;
    proxy_http_version 1.1;

    # WebSocket upgrade support
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Forward SSOwat-injected user info to the backend.
    # $ynh_user handles the ngx.var.ynh_user path (SSOwat sets nginx variable directly).
    # $http_ynh_user handles the ngx.req.set_header path (SSOwat modifies the request
    # header; $http_* variables reflect the current header value at proxy time).
    # The backend auth middleware checks both YNH_USER and X-Ynh-User.
    proxy_set_header YNH_USER      $ynh_user;
    proxy_set_header X-Ynh-User    $http_ynh_user;
    proxy_set_header YNH_EMAIL     $ynh_email;
    proxy_set_header YNH_FULLNAME  $ynh_fullname;

    # AUTH-01: shared proxy secret — prevents direct-to-port bypass
    proxy_set_header X-WG-Secret   __PROXY_SECRET__;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Generous timeouts for long-lived WebSocket connections
    proxy_read_timeout    86400;
    proxy_send_timeout    86400;
    proxy_connect_timeout 10;

    more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains";
}
