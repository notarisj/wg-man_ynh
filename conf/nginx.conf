#sub_path_only rewrite ^__PATH__$ __PATH__/ permanent;
location __PATH__/ {
    # Declare nginx variables for SSOwat Lua integration.
    # SSOwat may set them via ngx.var (ngx.var.ynh_user = user)
    # OR via ngx.req.set_header('YNH_USER', user).
    # We initialise from the incoming header so the direct-header path
    # is not overwritten with an empty string.
    set $ynh_user     $http_ynh_user;
    set $ynh_email    $http_ynh_email;
    set $ynh_fullname $http_ynh_fullname;

    proxy_pass http://127.0.0.1:__PORT__/;
    proxy_http_version 1.1;

    # WebSocket upgrade support
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Forward SSOwat-injected user info to the backend
    proxy_set_header YNH_USER      $ynh_user;
    proxy_set_header YNH_EMAIL     $ynh_email;
    proxy_set_header YNH_FULLNAME  $ynh_fullname;

    # AUTH-01: shared proxy secret — prevents direct-to-port bypass
    proxy_set_header X-WG-Secret   __PROXY_SECRET__;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Generous timeouts for long-lived WebSocket connections
    proxy_read_timeout    86400;
    proxy_send_timeout    86400;
    proxy_connect_timeout 10;

    more_set_headers "Strict-Transport-Security: max-age=15768000";
}
