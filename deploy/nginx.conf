# Nginx location snippet for wg-man
# Place this inside your YunoHost app's nginx config
# (usually auto-generated when you install via the "Redirect" app)
#
# The SSOwat Lua module sets $ynh_user after portal auth.
# We pass it as a header so the Express backend can read it.

location / {
    proxy_pass         http://127.0.0.1:3001;
    proxy_http_version 1.1;

    # WebSocket support
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # SSOwat user headers (injected by SSOwat Lua after authentication)
    proxy_set_header YNH_USER      $ynh_user;
    proxy_set_header YNH_EMAIL     $ynh_email;
    proxy_set_header YNH_FULLNAME  $ynh_fullname;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts (generous for long WS connections)
    proxy_read_timeout  86400;
    proxy_send_timeout  86400;
    proxy_connect_timeout 10;
}
